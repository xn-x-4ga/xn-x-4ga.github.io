<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conway's Game of Life | Wasm Edition</title>
    <meta name="description" content="Conway's Game of Life implemented in WebAssembly.">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Material+Icons');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css');
        
        ::selection { background: red; color: #fff; text-shadow: none; }
        body { font-family: serif; font-size: 1.25rem; line-height: 1.75; margin: auto; max-width: 50em; padding: 0 1rem; }
        a { color: inherit; text-decoration: none; border-bottom: 0.1rem solid #ff827c; transition: all 0.3s ease; }
        
        .buttons { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: .2rem; margin-bottom: 5rem; }
        .canvas-container { max-width: 800px; margin: 1em auto; border: 1px solid #ccc; position: relative; }
        
        h1, h2 { font-family: sans-serif; }
        #universe { display: block; margin: 0 auto; cursor: crosshair; image-rendering: pixelated; width: 100%; height: auto; }
        .speed-indicator { color: #666; font-family: sans-serif; text-align: right; font-size: 0.9rem; }
        input[type="button"] { cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>
    <main>
        <h1>Conway's Game of Life <small style="font-size: 0.5em; color: #ff827c;">WASM</small></h1>
        <p>The <a href="http://en.m.wikipedia.org/wiki/Conway's_Game_of_Life" target="_blank">Game of Life</a> implemented in <b>WebAssembly</b> for maximum performance. This version handles the evolution and pixel rendering directly in binary.</p>
        
        <div class="canvas-container">
            <div class="speed-indicator">
                Speed: <span id="speed">1</span>
            </div>
            <canvas id="universe" width="800" height="400"></canvas>
        </div>

        <div class="buttons">
            <input type="button" class="material-icons" value="play_arrow" id="toggleBtn">
            <input type="button" class="material-icons" value="skip_next" id="stepBtn">
            <input type="button" class="material-icons" value="clear" id="clearBtn">
            <select id="patterns" disabled>
                <option value="" selected="selected">Wasm Core Active</option>
            </select>
        </div>
    </main>

    <script>
        // Configuración de dimensiones
        const WIDTH = 800;
        const HEIGHT = 400;
        const CELL_SIZE = 1; // 1 pixel por célula para máxima densidad

        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        const speedText = document.getElementById('speed');
        
        // Memoria: Necesitamos (W*H bytes para celdas * 2) + (W*H*4 bytes para RGBA)
        // 800 * 400 * 6 = 1.92 MB. 1 página Wasm = 64KB. Necesitamos ~30 páginas.
        const memory = new WebAssembly.Memory({ initial: 40 }); 

        let isRunning = false;
        let wasmExports;
        
        // Punteros de memoria
        const cellsPtr = 0;
        const nextCellsPtr = WIDTH * HEIGHT;
        const pixelsPtr = nextCellsPtr * 2;

        async function initGame() {
            try {
                const response = await fetch('life.wasm');
                const buffer = await response.arrayBuffer();
                const obj = await WebAssembly.instantiate(buffer, { env: { memory } });
                
                wasmExports = obj.instance.exports;
                wasmExports.init(WIDTH, HEIGHT);
                
                // Pintar fondo inicial
                wasmExports.render(cellsPtr, pixelsPtr);
                updateCanvas();
                
                setupEvents();
                loop();
            } catch (e) {
                console.error("Error cargando Wasm:", e);
                alert("Necesitas el archivo life.wasm en la misma carpeta.");
            }
        }

        function updateCanvas() {
            const imgData = ctx.createImageData(WIDTH, HEIGHT);
            const pixelArray = new Uint8ClampedArray(memory.buffer, pixelsPtr, WIDTH * HEIGHT * 4);
            imgData.data.set(pixelArray);
            ctx.putImageData(imgData, 0, 0);
        }

        function loop() {
            if (isRunning) {
                wasmExports.nextGen(cellsPtr, nextCellsPtr);
                // Swap manual de punteros lógicos: copiamos el resultado a la memoria principal
                new Uint8Array(memory.buffer, cellsPtr, WIDTH * HEIGHT)
                    .set(new Uint8Array(memory.buffer, nextCellsPtr, WIDTH * HEIGHT));
                
                wasmExports.render(cellsPtr, pixelsPtr);
                updateCanvas();
            }
            requestAnimationFrame(loop);
        }

        function setupEvents() {
            // Iniciar / Pausa
            document.getElementById('toggleBtn').onclick = function() {
                isRunning = !isRunning;
                this.value = isRunning ? "pause" : "play_arrow";
            };

            // Paso único
            document.getElementById('stepBtn').onclick = function() {
                if (!isRunning) {
                    wasmExports.nextGen(cellsPtr, nextCellsPtr);
                    new Uint8Array(memory.buffer, cellsPtr, WIDTH * HEIGHT)
                        .set(new Uint8Array(memory.buffer, nextCellsPtr, WIDTH * HEIGHT));
                    wasmExports.render(cellsPtr, pixelsPtr);
                    updateCanvas();
                }
            };

            // Limpiar
            document.getElementById('clearBtn').onclick = function() {
                new Uint8Array(memory.buffer, cellsPtr, WIDTH * HEIGHT).fill(0);
                wasmExports.render(cellsPtr, pixelsPtr);
                updateCanvas();
            };

            // Dibujar con el mouse
            let isDrawing = false;
            canvas.onmousedown = () => isDrawing = true;
            window.onmouseup = () => isDrawing = false;
            
            canvas.onmousemove = function(e) {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / (rect.width / WIDTH));
                const y = Math.floor((e.clientY - rect.top) / (rect.height / HEIGHT));
                
                if (x >= 0 && x < WIDTH && y >= 0 && y < HEIGHT) {
                    const idx = cellsPtr + (y * WIDTH + x);
                    new Uint8Array(memory.buffer)[idx] = 1; // Revivir célula
                    wasmExports.render(cellsPtr, pixelsPtr);
                    updateCanvas();
                }
            };
        }

        initGame();
    </script>
</body>
</html>
